[build]
  command = "npm run build && npm run seo"
  publish = "dist"

[build.environment]
  # Set BEACON_BASE_URL in the Netlify UI to your production URL for sitemap/canonical tags.

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://clinicaltrials.gov https://nominatim.openstreetmap.org; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-src 'self'; base-uri 'self'"
    Referrer-Policy = "no-referrer"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "geolocation=(self), camera=(), microphone=()"
