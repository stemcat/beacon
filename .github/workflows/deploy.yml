# Deploys Beacon to GitHub Pages: build, run tests, generate SEO pages
# against the live registry, publish dist/. SEO regenerates on a weekly
# schedule so condition pages stay fresh without any server.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1" # weekly refresh of SEO pages (Mondays 06:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Generate SEO pages from live registry
        run: npm run seo
        env:
          BEACON_BASE_URL: ${{ vars.BEACON_BASE_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
